name: Publish Release
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - run: npm ci

      - name: Verify CLI version matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          CLI_VERSION=$(grep -oP '\.version\("\K[^"]+' src/cli.ts)
          if [ "$PKG_VERSION" != "$CLI_VERSION" ]; then
            echo "::error::Version mismatch: package.json=$PKG_VERSION, cli.ts=$CLI_VERSION"
            exit 1
          fi
          echo "Versions match: $PKG_VERSION"

      - name: Check if version is already published
        id: check
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and publish
        if: steps.check.outputs.published == 'false'
        run: npm run build && npm publish --access public

      - name: Ensure git tag exists
        if: steps.check.outputs.published == 'false'
        run: |
          TAG="v${{ steps.check.outputs.version }}"
          if ! git rev-parse "${TAG}" >/dev/null 2>&1; then
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.published == 'false'
        run: |
          TAG="v${{ steps.check.outputs.version }}"
          gh release create "${TAG}" --generate-notes --title "${TAG}" --verify-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Slack on success
        if: steps.check.outputs.published == 'false'
        run: |
          VERSION="v${{ steps.check.outputs.version }}"
          if [ -n "${{ secrets.SLACK_WEBHOOK }}" ]; then
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"📦 *@copilotkit/pathfinder ${VERSION} published*\nnpm: https://www.npmjs.com/package/@copilotkit/pathfinder/v/${{ steps.check.outputs.version }}\nRelease: https://github.com/${{ github.repository }}/releases/tag/${VERSION}\"}" || true
          fi

      - name: Notify Slack on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK }}" ]; then
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"❌ *Pathfinder release failed*\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}" || true
          fi
