# docker-compose.yml — Production setup using published image
# For development, use docker-compose.dev.yml instead.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pathfinder
      POSTGRES_USER: pathfinder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pathfinder"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: ghcr.io/copilotkit/pathfinder:latest
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      DATABASE_URL: postgres://pathfinder:${POSTGRES_PASSWORD:-changeme}@db:5432/pathfinder
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      PATHFINDER_CONFIG: /app/pathfinder.yaml
      PORT: ${PORT:-3001}
      NODE_ENV: production
    volumes:
      - ./pathfinder.yaml:/app/pathfinder.yaml:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
