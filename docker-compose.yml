services:
    db:
        image: pgvector/pgvector:pg16
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: mcp_docs
            POSTGRES_USER: mcp
            POSTGRES_PASSWORD: mcp_local
        volumes:
            - pgdata:/var/lib/postgresql/data
            - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U mcp"]
            interval: 5s
            retries: 5

    app:
        build:
            context: .
            dockerfile: Dockerfile
            target: dev
        ports:
            - "3001:3001"
        environment:
            DATABASE_URL: postgresql://mcp:mcp_local@db:5432/mcp_docs
            OPENAI_API_KEY: ${OPENAI_API_KEY}
            GITHUB_TOKEN: ${GITHUB_TOKEN:-}
            GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-local-dev-secret}
            PORT: 3001
            NODE_ENV: development
            LOG_LEVEL: debug
            AUTO_REINDEX_ENABLED: ${AUTO_REINDEX_ENABLED:-true}
            AUTO_REINDEX_CRON_HOUR: ${AUTO_REINDEX_CRON_HOUR:-3}
        volumes:
            - ./src:/app/src
            - ./scripts:/app/scripts
        depends_on:
            db:
                condition: service_healthy
        command: npx tsx watch src/index.ts

volumes:
    pgdata:
