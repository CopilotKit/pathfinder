server:
  name: my-docs-mcp
  version: "1.0.0"

sources:
  - name: docs
    type: markdown
    repo: https://github.com/your-org/your-repo.git
    path: docs/
    base_url: https://docs.your-project.com/
    url_derivation:
      strip_prefix: "docs/"
      strip_suffix: ".md"
    file_patterns: ["**/*.md"]
    chunk:
      target_tokens: 600
      overlap_tokens: 50

tools:
  - name: search-docs
    description: "Search documentation for relevant information."
    source: docs
    default_limit: 5
    max_limit: 20
    result_format: docs

  # Collect tools write structured data from agents to the database.
  # Define input schema, description, and a canned response — no code needed.
  - name: submit-feedback
    type: collect
    description: "Submit feedback on whether search results were helpful."
    response: "Feedback recorded. Thank you."
    schema:
      tool_name:
        type: string
        description: "Which search tool was used"
        required: true
      rating:
        type: enum
        values: ["helpful", "not_helpful"]
        description: "Whether the results were helpful"
        required: true
      comment:
        type: string
        description: "What worked or didn't work"
        required: true

embedding:
  provider: openai
  model: text-embedding-3-small
  dimensions: 1536

indexing:
  auto_reindex: true
  reindex_hour_utc: 3
  stale_threshold_hours: 24
