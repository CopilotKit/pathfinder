<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14.5" fill="#0a0a0f" stroke="#00ccff" stroke-width="2"/>
  <!-- Cardinal tick marks -->
  <line x1="16" y1="3" x2="16" y2="6" stroke="#00ccff" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="26" x2="16" y2="29" stroke="#555570" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="3" y1="16" x2="6" y2="16" stroke="#555570" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="16" x2="29" y2="16" stroke="#555570" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Compass needle — north (blue, pointing up) -->
  <polygon points="16,5.5 18.5,15 16,13.5 13.5,15" fill="#00ccff"/>
  <!-- Compass needle — south (dim) -->
  <polygon points="16,26.5 13.5,17 16,18.5 18.5,17" fill="#555570"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#00ccff"/>
</svg>
